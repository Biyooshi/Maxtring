<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Maxtring</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .fc-event {
          white-space: normal !important;
          overflow: visible !important;
          line-height: 1.3;
          padding: 3px 5px !important;
        }
        .fc-daygrid-event-harness {
          margin-bottom: 2px;
        }
        .fc-daygrid-day-frame {
          min-height: 90px;
        }
    </style>
    
    <!-- FullCalendar and Draggable -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        #external-events {
            padding: 1rem;
            background: rgba(0,0,0,0.02);
            border-radius: var(--radius-sm);
            border: 1px dashed var(--border);
            max-height: 600px;
            overflow-y: auto;
        }
        [data-theme="dark"] #external-events {
            background: rgba(255,255,255,0.02);
        }
        .fc-event-draggable {
            margin: 10px 0;
            padding: 12px;
            background: var(--surface);
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            box-shadow: var(--shadow-sm);
            cursor: move;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-brand">Maxtring</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="calendar.html" class="nav-item active"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
            <a href="public-matrix.html" class="nav-item"><i class="fa-solid fa-table"></i> Public Matrix</a>
            <a href="content-bank.html" class="nav-item" id="nav-content-bank" style="display: none;"><i class="fa-solid fa-lightbulb"></i> Content Bank</a>
            <a href="business-process.html" class="nav-item"><i class="fa-solid fa-book"></i> SOP</a>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="theme-toggle glass" style="width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; color: var(--text-main);"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>
    
    <div class="nav-bottom">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="calendar.html" class="nav-item active"><i class="fa-solid fa-calendar-days"></i></a>
        <a href="public-matrix.html" class="nav-item"><i class="fa-solid fa-table"></i></a>
        <a href="business-process.html" class="nav-item"><i class="fa-solid fa-book"></i></a>
    </div>
    
    <main class="container animate-fade-up">
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem;"><i class="fa-solid fa-calendar-days"></i> Kalender Konten</h1>
        </div>
        
        <div class="grid" style="grid-template-columns: 280px 1fr; gap: 2rem;" id="calendar-layout">
            
            <!-- Sidebar / External Events (Only for SMS/CMO) -->
            <div id="sidebar-container" style="display: none;">
                <h3 style="margin-bottom: 1rem; font-size: 1rem;"><i class="fa-solid fa-boxes-stacked"></i> Ide Siap Jadwal</h3>
                <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 1rem;">Drag ide di bawah ini dan lepaskan di kotak kalender.</p>
                <div id="external-events">
                    <div style="text-align: center; color: var(--text-muted); padding: 1rem;" id="draggable-loader">
                        Memuat data...
                    </div>
                    <!-- Draggable events will be inserted here -->
                </div>
            </div>
            
            <!-- Calendar Container -->
            <div class="card" id="calendar-wrapper" style="grid-column: 1 / -1;"> <!-- Default full width -->
                <div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-bottom:1rem;font-size:0.85rem;">
                    <span style="display:flex;align-items:center;gap:0.4rem;"><span style="width:14px;height:14px;border-radius:4px;background:#2f668f;display:inline-block;"></span> Belum Selesai</span>
                    <span style="display:flex;align-items:center;gap:0.4rem;"><span style="width:14px;height:14px;border-radius:4px;background:#10B981;display:inline-block;"></span> Siap Upload (On Process)</span>
                    <span style="display:flex;align-items:center;gap:0.4rem;"><span style="width:14px;height:14px;border-radius:4px;background:#8B5CF6;display:inline-block;"></span> Sudah Posted (Done)</span>
                </div>
                <div id='calendar'></div>
            </div>
            
        </div>
    </main>
    
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;
            
            // Layout Adjustments based on Role
            const sidebar = document.getElementById('sidebar-container');
            const calWrapper = document.getElementById('calendar-wrapper');
            
            if (user.role === 'SMS' || user.role === 'CMO') {
                document.getElementById('nav-content-bank').style.display = 'flex';
                // Show sidebar and adjust calendar width
                sidebar.style.display = 'block';
                calWrapper.style.gridColumn = 'auto'; // Revert to grid placing
                
                // Fetch Content Bank to populate Draggables
                fetchAndPopulateDraggables();
            }
            
            // Initialize Calendar
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                editable: false, // Matrix events are not draggable once placed (in this version)
                droppable: true, // Allows dropping external events
                height: 650,
                events: async function(info, successCallback, failureCallback) {
                    // Fetch Matrix data
                    const result = await callApi('getMatrixData', { month: MATRIX_MONTH_TAB });
                    if (result && result.success) {
                        const events = result.data
                            .map(row => {
                                const parsedDate = parseIndonesianDate(row["Upload Deadline"]);
                                if (!parsedDate) return null; // skip baris dengan tanggal tidak valid/kosong

                                const overallStatus = computeOverallStatus(row);
                                let color = '#2f668f'; // PENDING
                                if (overallStatus === 'DONE') color = '#8B5CF6';
                                if (overallStatus === 'ON PROCESS') color = '#10B981';

                                const isoDate = parsedDate.toISOString().split('T')[0];

                                return {
                                    title: `${row["Content Ideas"] || 'Tanpa Judul'} (${overallStatus})`,
                                    start: isoDate,
                                    allDay: true,
                                    backgroundColor: color
                                };
                            })
                            .filter(e => e !== null);
                        successCallback(events);
                    } else {
                        failureCallback();
                    }
                },
                drop: async function(info) {
                    // Triggered when an external event is dropped onto the calendar
                    const dateStr = info.dateStr;
                    const ideaId = info.draggedEl.getAttribute('data-id');
                    const ideaTitle = info.draggedEl.getAttribute('data-title');
                    
                    if(confirm(`Jadwalkan "${ideaTitle}" untuk tanggal ${dateStr}?`)) {
                        // Call API to schedule
                        const res = await callApi('scheduleIdea', {
                            ideaData: { id: ideaId, title: ideaTitle, date: dateStr, month: MATRIX_MONTH_TAB }
                        });
                        
                        if (res && res.success) {
                            alert("Berhasil dijadwalkan!");
                            // Remove from draggable list
                            info.draggedEl.parentNode.removeChild(info.draggedEl);
                            // Refresh Calendar
                            calendar.refetchEvents();
                        }
                    }
                }
            });
            
            calendar.render();
            
            // Initialize Draggables
            new FullCalendar.Draggable(document.getElementById('external-events'), {
                itemSelector: '.fc-event-draggable',
                eventData: function(eventEl) {
                    return {
                        title: eventEl.innerText
                    };
                }
            });
        });
        
        async function fetchAndPopulateDraggables() {
            const container = document.getElementById('external-events');
            const result = await callApi('getContentBankData', { month: CONTENT_BANK_MONTH_TAB });
            
            if (result && result.success) {
                let html = '';
                // Filter only 'Accepted' status to be dragged
                const acceptedIdeas = result.data.filter(row => row['Ideas Status'] === 'Accepted');
                
                if (acceptedIdeas.length === 0) {
                    html = '<div style="text-align:center; padding: 1rem; color: var(--text-muted);">Tidak ada ide Accepted.</div>';
                } else {
                    acceptedIdeas.forEach(idea => {
                        const customId = idea['_id'] || ((idea['No'] || '') + '-' + (idea['Pillar'] || ''));
                        html += `
                            <div class="fc-event-draggable" data-id="${customId}" data-title="${(idea['Content Ideas']||'').replace(/"/g, '&quot;')}">
                                <div><i class="fa-solid fa-grip-vertical text-muted" style="margin-right: 0.5rem;"></i>${idea['Content Ideas']}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Pillar: ${idea['Pillar']}</div>
                            </div>
                        `;
                    });
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="text-align:center; padding: 1rem; color: var(--danger);">Gagal memuat.</div>';
            }
        }
    </script>
</body>
</html>
