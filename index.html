<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maxtring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
</head>
<body style="align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-color) 0%, hsla(var(--hue-primary), 80%, 60%, 0.15) 100%);">
    
    <button id="theme-toggle" class="theme-toggle glass" style="position: absolute; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: none; color: var(--text-main);"><i class="fa-solid fa-moon"></i></button>
    
    <div class="card glass card-glow animate-fade-up" style="width: 100%; max-width: 420px; padding: 2.5rem 2rem; text-align: center; border-radius: 24px;">
        <div style="font-size: 3rem; margin-bottom: 0.5rem; text-shadow: 0 4px 12px rgba(0,0,0,0.1);">🚀</div>
        <h1 class="nav-brand" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Maxtring</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-weight: 500;">Matrix All Marketing - Job On Yours</p>
        
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="username">Role ID</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" class="form-input" style="padding-left: 2.8rem;" placeholder="e.g. staff-cw, head-gd, cmo" required>
                </div>
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-input" style="padding-left: 2.8rem;" placeholder="Masukkan password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.9rem; font-size: 1.05rem;">
                Lanjut Pilih Nama <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </form>
        
        <form id="name-form" style="display: none; margin-top: 1rem;">
            <div class="form-group" style="text-align: left;">
                <label class="form-label" for="name-select">Siapa kamu?</label>
                <select id="name-select" class="form-select" required>
                    <option value="">-- Pilih Nama --</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.9rem; font-size: 1.05rem;">
                Masuk Dashboard <i class="fa-solid fa-right-to-bracket" style="margin-left: 0.5rem;"></i>
            </button>
        </form>
        
    </div>
    
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('maxtring_user')) {
                window.location.href = 'dashboard.html';
            }
            
            let tempUserData = null;
            
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                
                const result = await callApi('login', { username: user, password: pass });
                
                if (result && result.success) {
                    tempUserData = { role: result.role, type: result.type };
                    
                    const select = document.getElementById('name-select');
                    select.innerHTML = '<option value="">-- Pilih Nama --</option>';
                    
                    if (result.team && result.team.length > 0) {
                        result.team.forEach(member => {
                            const option = document.createElement('option');
                            option.value = member.nama;
                            option.textContent = member.nama;
                            select.appendChild(option);
                        });
                    } else {
                        const option = document.createElement('option');
                        option.value = "Default";
                        option.textContent = "Default (No Team Data)";
                        select.appendChild(option);
                    }
                    
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('name-form').style.display = 'block';
                    document.getElementById('name-form').classList.add('animate-fade-up');
                } else if (result) {
                    alert(result.error || "Gagal login");
                }
            });
            
            document.getElementById('name-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const selectedName = document.getElementById('name-select').value;
                
                if (selectedName && tempUserData) {
                    tempUserData.name = selectedName;
                    localStorage.setItem('maxtring_user', JSON.stringify(tempUserData));
                    window.location.href = 'dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
